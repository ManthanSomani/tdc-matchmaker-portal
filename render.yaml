services:
  - type: web
    name: tdc-matchmaker-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DEMO_ADMIN_USERNAME
        sync: false
      - key: DEMO_ADMIN_PASSWORD_HASH
        sync: false
      - key: NLP_SERVICE_URL
        sync: false
      - key: NLP_TIMEOUT_MS
        value: "5000"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
